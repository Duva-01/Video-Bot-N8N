services:
  - type: web
    name: bot-de-videos-n8n
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "10000"
      - key: N8N_INTERNAL_HOST
        value: 127.0.0.1
      - key: N8N_INTERNAL_PORT
        value: "5678"
      - key: KEEP_ALIVE_ENABLED
        value: "true"
      - key: KEEP_ALIVE_INTERVAL_MS
        value: "300000"
      - key: WEBHOOK_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: YOUTUBE_PRIVACY_STATUS
        value: private
      - key: YOUTUBE_CATEGORY_ID
        value: "28"
      - key: YOUTUBE_DEFAULT_TITLE
        value: Short IA automatizado
      - key: YOUTUBE_DEFAULT_DESCRIPTION
        value: Video generado automaticamente con n8n.
      - key: YOUTUBE_DEFAULT_TAGS
        value: ia,automatizacion,shorts
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_REFRESH_TOKEN
        sync: false
      - key: TIKTOK_OPEN_ID
        sync: false
